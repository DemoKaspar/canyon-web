<!DOCTYPE html>
<html lang="en">
<head>

    <title>Canyon Web - Debug Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            background: #0D0D0F;

<body>

        <h1>Canyon Web - Static Test</h1>
        <div class="status">
            <strong>Status:</strong> Static HTML deployment test successful!

    <script>
        document.getElementById('time').textContent = new Date().toISOString();
